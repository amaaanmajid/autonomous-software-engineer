version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: []

  test-runner:
    image: python:3.11-slim
    working_dir: /repo
    volumes:
      - ${TARGET_REPO_PATH:-/tmp/ase_workspace}:/repo
    command: ["pytest", "-v", "--tb=short"]
    profiles:
      - testing
